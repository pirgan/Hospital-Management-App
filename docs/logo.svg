<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="20" x2="400" y2="20"/>
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="40" y1="0" x2="40" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="120"/>
    <line x1="120" y1="0" x2="120" y2="120"/>
  </g>

  <!-- Icon shield/hex background -->
  <circle cx="60" cy="60" r="42" fill="#0f172a" opacity="0.6"/>
  <circle cx="60" cy="60" r="42" fill="none" stroke="url(#crossGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Medical cross -->
  <rect x="46" y="35" width="28" height="50" rx="5" fill="url(#crossGrad)" filter="url(#glow)"/>
  <rect x="35" y="46" width="50" height="28" rx="5" fill="url(#crossGrad)" filter="url(#glow)"/>

  <!-- AI circuit dots on cross -->
  <circle cx="60" cy="60" r="4" fill="#0f172a"/>
  <circle cx="60" cy="60" r="2" fill="#06b6d4"/>

  <!-- Circuit lines emanating from cross -->
  <line x1="76" y1="55" x2="88" y2="55" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <circle cx="90" cy="55" r="2" fill="#06b6d4" opacity="0.7"/>
  <line x1="76" y1="65" x2="88" y2="65" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
  <circle cx="90" cy="65" r="2" fill="#3b82f6" opacity="0.7"/>
  <line x1="55" y1="77" x2="55" y2="89" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <circle cx="55" cy="91" r="2" fill="#06b6d4" opacity="0.7"/>

  <!-- ECG/pulse line at bottom of icon -->
  <polyline points="20,80 28,80 32,70 37,90 42,72 47,80 104,80"
            fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brand name -->
  <text x="120" y="52" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">
    Medi<tspan fill="url(#crossGrad)">Core</tspan>
  </text>

  <!-- Subtitle -->
  <text x="121" y="72" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="3">
    GENERAL HOSPITAL
  </text>

  <!-- Divider line -->
  <line x1="120" y1="79" x2="380" y2="79" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Tagline -->
  <text x="121" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-style="italic" fill="#64748b" letter-spacing="0.5">
    Caring for patients, powered by intelligence.
  </text>

  <!-- AI badge -->
  <rect x="310" y="88" width="66" height="20" rx="10" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="343" y="101" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing="1">
    AI-POWERED
  </text>
</svg>
